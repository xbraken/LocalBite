name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Optional format check (if Prettier is present)
        run: |
          if npm ls prettier --depth=0 >/dev/null 2>&1; then
            npx prettier --check .
          else
            echo "Prettier not installed; skipping format check."
          fi
