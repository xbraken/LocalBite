}

// ─── ITEM CUSTOMISER MODAL ──────────────────────────────
// Used by both CustomerOrdering and CashierKiosk
// Handles required/optional modifier groups before adding to basket

function ItemCustomiserModal({item, cat, onAdd, onClose}) {
  const cs = CAT_STYLE[cat] || CAT_STYLE['Mains'];
  const groups = item.modifierGroups || [];

  // selections: { [groupId]: Set of optionIds }
  const initSelections = () => {
    const s = {};
    groups.forEach(g => { s[g.id] = new Set(); });
    return s;
  };
  const [selections, setSelections] = React.useState(initSelections);

  const toggleOption = (group, optId) => {
    setSelections(prev => {
      const next = {...prev};
      const cur = new Set(prev[group.id]);
      if (group.max === 1) {
        // radio — replace
        next[group.id] = new Set([optId]);
      } else {
        // checkbox with max enforcement
        if (cur.has(optId)) {
          cur.delete(optId);
        } else if (cur.size < group.max) {
          cur.add(optId);
        }
        next[group.id] = cur;
      }
      return next;
    });
  };

  // Validate: all required groups have min selections met
  const valid = groups.every(g => {
    if (g.type === 'required') return selections[g.id].size >= g.min;
    return true;
  });

  // Compute total price
  const extraCost = groups.reduce((sum, g) => {
    return sum + g.options
      .filter(o => selections[g.id]?.has(o.id))
      .reduce((s, o) => s + o.price, 0);
  }, 0);
  const totalPrice = item.price + extraCost;

  // Build summary of selections for basket label
  const buildSelectionSummary = () => {
    const parts = [];
    groups.forEach(g => {
      const chosen = g.options.filter(o => selections[g.id]?.has(o.id));
      if (chosen.length > 0) parts.push(chosen.map(o=>o.label).join(', '));
    });
    return parts.join(' · ');
  };

  const handleAdd = () => {
    const summary = buildSelectionSummary();
    onAdd({
      ...item,
      price: totalPrice,
      customisationLabel: summary || null,
      // unique id per configuration so same item with diff options = separate line
      basketId: item.id + '_' + Date.now(),
    });
    onClose();
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300,backdropFilter:'blur(6px)'}}
      onClick={onClose}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:'#111',border:'1px solid #222',borderRadius:16,width:480,maxHeight:'82vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 32px 80px rgba(0,0,0,.7)'}}>

        {/* Header */}
        <div style={{padding:'20px 24px',borderBottom:'1px solid #1a1a1a',display:'flex',gap:14,alignItems:'flex-start',flexShrink:0}}>
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:800,color:'#F0EBE3',lineHeight:1.2}}>{item.name}</div>
            <div style={{fontSize:12,color:'#4a4440',marginTop:4,lineHeight:1.5}}>{item.desc}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
            <button onClick={onClose} style={{background:'none',border:'none',color:'#4a4440',fontSize:20,cursor:'pointer',lineHeight:1,padding:'0 0 4px'}}>×</button>
            <span style={{fontSize:15,fontWeight:800,color:cs.accent}}>£{totalPrice.toFixed(2)}</span>
          </div>
        </div>

        {/* Modifier groups */}
        <div style={{overflowY:'auto',flex:1,padding:'8px 0'}}>
          {groups.map((group, gi) => {
            const isComplete = group.type === 'required'
              ? selections[group.id].size >= group.min
              : true;
            const chosenCount = selections[group.id].size;

            return (
              <div key={group.id} style={{borderBottom:'1px solid #161616'}}>
                {/* Group header */}
                <div style={{padding:'14px 24px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <span style={{fontSize:13,fontWeight:700,color:'#F0EBE3'}}>{group.label}</span>
                    <span style={{marginLeft:8,fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',
                      color: group.type==='required' ? cs.accent : '#5a5450',
                      background: group.type==='required' ? `${cs.accent}18` : '#1a1a1a',
                      border: `1px solid ${group.type==='required' ? cs.accent+'44' : '#252525'}`,
                      borderRadius:4,padding:'2px 6px',
                    }}>
                      {group.type==='required' ? 'Required' : 'Optional'}
                    </span>
                  </div>
                  <div style={{fontSize:11,color: isComplete ? green : '#4a4440'}}>
                    {group.max === 1
                      ? (isComplete ? '✓ Selected' : 'Pick 1')
                      : `${chosenCount}/${group.max} · Pick up to ${group.max}`}
                  </div>
                </div>

                {/* Options */}
                <div style={{padding:'0 24px 14px',display:'flex',flexDirection:'column',gap:6}}>
                  {group.options.map(opt => {
                    const isChosen = selections[group.id]?.has(opt.id);
                    const isDisabled = !isChosen && chosenCount >= group.max;
                    return (
                      <button key={opt.id}
                        onClick={() => !isDisabled && toggleOption(group, opt.id)}
                        style={{
                          display:'flex', alignItems:'center', gap:12, padding:'11px 14px',
                          borderRadius:9, border:`1.5px solid ${isChosen ? cs.accent : '#1e1e1e'}`,
                          background: isChosen ? `${cs.accent}14` : '#0e0e0e',
                          cursor: isDisabled ? 'not-allowed' : 'pointer',
                          opacity: isDisabled ? 0.4 : 1,
                          transition:'all .12s', textAlign:'left',
                        }}>
                        {/* Radio / checkbox indicator */}
                        <div style={{
                          width:18, height:18, borderRadius: group.max===1?'50%':'5px',
                          border:`2px solid ${isChosen ? cs.accent : '#333'}`,
                          background: isChosen ? cs.accent : 'transparent',
                          display:'flex', alignItems:'center', justifyContent:'center',
                          flexShrink:0, transition:'all .12s',
                        }}>
                          {isChosen && <div style={{width:6,height:6,borderRadius: group.max===1?'50%':'2px',background:'#0C0C0C'}}/>}
                        </div>
                        <span style={{flex:1,fontSize:13,color:isChosen?'#F0EBE3':'#9a9490',fontWeight:isChosen?600:400}}>{opt.label}</span>
                        {opt.price !== 0 && (
                          <span style={{fontSize:12,fontWeight:700,color: isChosen?cs.accent:'#5a5450',flexShrink:0}}>
                            {opt.price > 0 ? `+£${opt.price.toFixed(2)}` : `-£${Math.abs(opt.price).toFixed(2)}`}
                          </span>
                        )}
                        {opt.price === 0 && <span style={{fontSize:11,color:'#3a3430',flexShrink:0}}>included</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* Footer CTA */}
        <div style={{padding:'16px 24px',borderTop:'1px solid #1a1a1a',flexShrink:0,background:'#0d0d0d'}}>
          {!valid && (
            <div style={{fontSize:11,color:'#C0392B',marginBottom:10,textAlign:'center'}}>
              Please complete all required selections above
            </div>
          )}
          <button onClick={handleAdd} disabled={!valid} style={{
            width:'100%',padding:'14px',borderRadius:10,border:'none',
            background: valid ? `linear-gradient(135deg,${cs.accent},#C0392B)` : '#1e1e1e',
            color: valid ? '#fff' : '#3a3430',
            fontSize:14,fontWeight:800,cursor:valid?'pointer':'not-allowed',
            transition:'all .2s',letterSpacing:'0.02em',
          }}>
            {valid ? `Add to order · £${totalPrice.toFixed(2)}` : 'Complete your selection'}
          </button>
        </div>
      </div>
    </div>
  );
}

            <div style={{display:'flex',justifyContent:'space-between',marginBottom:14,fontSize:12,color:'#4a4440'}}><span>Delivery</span><span style={{color:green}}>Free</span></div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:16,fontSize:15,fontWeight:800}}>
              <span style={{color:'#F0EBE3'}}>Total</span>
              <span style={{color:gold}}>£{total.toFixed(2)}</span>
            </div>
            <button onClick={onCheckout} style={{width:'100%',padding:'13px',borderRadius:9,border:'none',background:'linear-gradient(135deg,#D4A017,#C0392B)',color:'#fff',fontSize:13,fontWeight:800,cursor:'pointer',letterSpacing:'0.02em'}}>
              Go to Checkout →

        </div>

function elapsed(t){const[h,m]=t.split(':').map(Number);const now=new Date();const diff=(now.getHours()*60+now.getMinutes())-(h*60+m);if(diff<=0)return'Just now';if(diff<60)return`${diff}m ago`;return`${Math.floor(diff/60)}h ${diff%60}m ago`;}

      </div>)}

function InlineEdit({value,prefix='',suffix='',onChange}){
  const [editing,setEditing]=React.useState(false);
  const [val,setVal]=React.useState(String(value));
  const ref=React.useRef();
  React.useEffect(()=>{if(editing&&ref.current)ref.current.focus();},[editing]);
  const commit=()=>{setEditing(false);onChange(parseFloat(val)||value);};
  return editing?<input ref={ref} value={val} onChange={e=>setVal(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){setVal(String(value));setEditing(false);}}}
    style={{width:58,background:'#1a1a1a',border:`1px solid ${gold}`,borderRadius:4,padding:'3px 6px',color:'#F0EBE3',fontSize:12,outline:'none',fontFamily:'inherit'}}/>
  :<span onClick={()=>setEditing(true)} title="Click to edit" style={{cursor:'text',color:'#C0BCB8',fontSize:12,borderBottom:'1px dashed #2a2a2a',paddingBottom:1}}>{prefix}{parseFloat(val).toFixed(suffix==='%'?1:2)}{suffix}</span>;
}

          </div>
        )}

        <div style={{padding:'16px 24px'}}>
          <button onClick={handleCharge} disabled={processing||(method==='cash'&&change<0)} style={{width:'100%',padding:'14px',borderRadius:9,border:'none',background:processing?'#1e1e1e':'linear-gradient(135deg,#D4A017,#C0392B)',color:processing?'#4a4440':'#fff',fontSize:15,fontWeight:800,cursor:processing?'not-allowed':'pointer',transition:'all .3s'}}>
            {processing ? (method==='card'?'Awaiting card…':'Processing…') : `Charge £${total.toFixed(2)}`}
          </button>
        </div>
      </div>
    </div>
  );
}

function CashierKiosk() {
  const [tab, setTab] = React.useState('All');
  const [query, setQuery] = React.useState('');
  const [ticket, setTicket] = React.useState([]); // [{...item, lineId, qty, note}]
  const [selectedLine, setSelectedLine] = React.useState(null);
  const [showPayment, setShowPayment] = React.useState(false);
  const [mode, setMode] = React.useState('dine-in'); // dine-in | collection
  const searchRef = React.useRef();

  const filtered = ALL_ITEMS.filter(item => {
    const matchTab = tab === 'All' || item.cat === tab;
    const matchQ = !query || item.name.toLowerCase().includes(query.toLowerCase());
    return matchTab && matchQ;
  });

  const addItem = (item) => {
    const existing = ticket.find(l => l.id === item.id && !l.note);
    if (existing) {
      setTicket(t => t.map(l => l.lineId === existing.lineId ? {...l, qty: l.qty+1} : l));
    } else {
      const lineId = Date.now() + Math.random();
      setTicket(t => [...t, {...item, lineId, qty:1, note:''}]);
      setSelectedLine(lineId);
    }
  };

  const removeItem = (lineId) => {
    setTicket(t => t.filter(l => l.lineId !== lineId));
    setSelectedLine(null);
  };

  const adjustQty = (lineId, delta) => {
    setTicket(t => t.map(l => l.lineId===lineId ? {...l, qty: Math.max(1, l.qty+delta)} : l));
  };

  const addNote = (lineId, note) => {
    setTicket(t => t.map(l => l.lineId===lineId ? {...l, note} : l));
  };

  const subtotal = ticket.reduce((s,l) => s + l.price * l.qty, 0);
  const selectedLineObj = ticket.find(l => l.lineId === selectedLine);

  const catAccent = tab !== 'All' ? (CAT_STYLE[tab]?.accent || gold) : gold;

  return (
    <div style={{display:'flex', height:'calc(100vh - 44px)', background:'#080808', overflow:'hidden', fontFamily:'inherit'}}>
      {showPayment && <PaymentModal total={subtotal} onComplete={()=>{setTicket([]);setSelectedLine(null);setShowPayment(false);}} onClose={()=>setShowPayment(false)}/>}

      {/* ════ LEFT: Item Picker ════ */}
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden', borderRight:'1px solid #161616'}}>

        {/* Search + mode */}
        <div style={{padding:'14px 18px', background:'#0a0a0a', borderBottom:'1px solid #161616', display:'flex', gap:10, alignItems:'center', flexShrink:0}}>
          <div style={{flex:1, position:'relative'}}>
            <svg style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',opacity:.4}} width="14" height="14" viewBox="0 0 14 14"><circle cx="6" cy="6" r="5" stroke="#F0EBE3" strokeWidth="1.5" fill="none"/><line x1="10" y1="10" x2="13" y2="13" stroke="#F0EBE3" strokeWidth="1.5" strokeLinecap="round"/></svg>
            <input ref={searchRef} value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search items…"
              style={{width:'100%',background:'#141414',border:'1px solid #1e1e1e',borderRadius:9,padding:'11px 12px 11px 34px',color:'#F0EBE3',fontSize:14,outline:'none'}}
              onFocus={e=>e.target.style.borderColor=gold} onBlur={e=>e.target.style.borderColor='#1e1e1e'}/>
            {query && <button onClick={()=>setQuery('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#4a4440',fontSize:16,cursor:'pointer',lineHeight:1}}>×</button>}
          </div>
          {/* Mode toggle */}
          <div style={{display:'flex',gap:0,background:'#141414',borderRadius:8,border:'1px solid #1e1e1e',overflow:'hidden',flexShrink:0}}>
            {['dine-in','collection'].map(m=>(
              <button key={m} onClick={()=>setMode(m)} style={{padding:'9px 14px',border:'none',background:mode===m?gold:'transparent',color:mode===m?'#0C0C0C':'#4a4440',fontSize:11,fontWeight:700,cursor:'pointer',textTransform:'capitalize',transition:'all .15s'}}>
                {m==='dine-in'?'Dine In':'Collection'}
              </button>
            ))}
          </div>
        </div>

        {/* Category tabs */}
        <div style={{display:'flex',gap:0,background:'#0a0a0a',borderBottom:'1px solid #161616',overflowX:'auto',flexShrink:0,padding:'0 18px'}}>
          {CAT_TABS.map(c => {
            const isActive = tab === c;
            const accent = c !== 'All' ? (CAT_STYLE[c]?.accent || gold) : gold;
            return (
              <button key={c} onClick={()=>{setTab(c);setQuery('');}} style={{padding:'0 16px',height:42,border:'none',background:'transparent',borderBottom:`2.5px solid ${isActive?accent:'transparent'}`,color:isActive?accent:'#4a4440',fontSize:13,fontWeight:isActive?700:400,cursor:'pointer',whiteSpace:'nowrap',transition:'all .15s',flexShrink:0}}>
                {c}
              </button>
            );
          })}
        </div>

        {/* Item grid — large tap targets */}
        <div style={{flex:1, overflowY:'auto', padding:'16px 18px'}}>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(170px, 1fr))', gap:10}}>
            {filtered.map(item => {
              const inTicket = ticket.find(l => l.id === item.id);
              const totalQty = ticket.filter(l => l.id === item.id).reduce((s,l)=>s+l.qty,0);
              const cs = CAT_STYLE[item.cat] || CAT_STYLE['Mains'];
              return (
                <button key={item.id} onClick={()=>addItem(item)}
                  style={{background: totalQty>0 ? `rgba(${cs.accent==='#D4A017'?'212,160,23':'192,57,43'}, .08)` : '#111',
                    border:`1.5px solid ${totalQty>0?cs.accent+'55':'#1e1e1e'}`,
                    borderRadius:10, padding:'14px 14px 13px', cursor:'pointer', textAlign:'left',
                    display:'flex', flexDirection:'column', gap:6, transition:'all .12s',
                    position:'relative',
                  }}
                  onMouseEnter={e=>{ e.currentTarget.style.borderColor=cs.accent+'88'; e.currentTarget.style.background='#161616'; }}
                  onMouseLeave={e=>{ e.currentTarget.style.borderColor=totalQty>0?cs.accent+'55':'#1e1e1e'; e.currentTarget.style.background=totalQty>0?`rgba(${cs.accent==='#D4A017'?'212,160,23':'192,57,43'}, .08)`:'#111'; }}
                >
                  {totalQty > 0 && (
                    <div style={{position:'absolute',top:8,right:8,width:22,height:22,borderRadius:'50%',background:cs.accent,color:'#0C0C0C',fontSize:11,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {totalQty}
                    </div>
                  )}
                  <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.07em',color:cs.accent,opacity:.7}}>{item.cat}</div>
                  <div style={{fontSize:13,fontWeight:700,color:'#F0EBE3',lineHeight:1.25,textWrap:'pretty'}}>{item.name}</div>
                  <div style={{fontSize:14,fontWeight:800,color:cs.accent,marginTop:2}}>£{item.price.toFixed(2)}</div>
                </button>
              );
            })}
            {filtered.length === 0 && (
              <div style={{gridColumn:'1/-1',textAlign:'center',paddingTop:48,color:'#2a2a2a',fontSize:13}}>No items match "{query}"</div>
            )}
          </div>
        </div>
      </div>

      {/* ════ RIGHT: Order Ticket ════ */}
      <div style={{width:340, display:'flex', flexDirection:'column', background:'#0a0a0a', flexShrink:0}}>

        {/* Ticket header */}
        <div style={{padding:'14px 18px', borderBottom:'1px solid #161616', display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0}}>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:'#F0EBE3'}}>Order Ticket</div>
            <div style={{fontSize:11,color:'#3a3430',marginTop:2,textTransform:'capitalize'}}>{mode} · {ticket.length === 0 ? 'Empty' : `${ticket.reduce((s,l)=>s+l.qty,0)} items`}</div>
          </div>
          {ticket.length > 0 && (
            <button onClick={()=>{setTicket([]);setSelectedLine(null);}} style={{fontSize:11,color:red,background:'none',border:`1px solid rgba(192,57,43,.3)`,borderRadius:5,padding:'5px 10px',cursor:'pointer',fontWeight:600}}>
              Void all
            </button>
          )}
        </div>

        {/* Line items */}
        <div style={{flex:1, overflowY:'auto', padding:'10px 0'}}>
          {ticket.length === 0 ? (
            <div style={{textAlign:'center',paddingTop:56,color:'#1e1e1e'}}>
              <svg width="48" height="48" viewBox="0 0 48 48" style={{opacity:.3}} fill="none"><rect x="10" y="6" width="28" height="36" rx="4" stroke="#F0EBE3" strokeWidth="2"/><line x1="16" y1="16" x2="32" y2="16" stroke="#F0EBE3" strokeWidth="1.5"/><line x1="16" y1="22" x2="32" y2="22" stroke="#F0EBE3" strokeWidth="1.5"/><line x1="16" y1="28" x2="24" y2="28" stroke="#F0EBE3" strokeWidth="1.5"/></svg>
              <div style={{fontSize:12,color:'#2a2a2a',marginTop:10}}>Tap items to add</div>
            </div>
          ) : ticket.map(line => {
            const isSelected = selectedLine === line.lineId;
            const cs = CAT_STYLE[line.cat] || CAT_STYLE['Mains'];
            return (
              <div key={line.lineId} onClick={()=>setSelectedLine(isSelected?null:line.lineId)}
                style={{padding:'10px 18px', borderBottom:'1px solid #141414', cursor:'pointer',
                  background: isSelected ? '#141414' : 'transparent',
                  borderLeft: isSelected ? `3px solid ${cs.accent}` : '3px solid transparent',
                  transition:'all .1s',
                }}>
                <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
                  {/* Qty controls */}
                  <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,flexShrink:0}}>
                    <button onClick={e=>{e.stopPropagation();adjustQty(line.lineId,1);}} style={{width:24,height:24,borderRadius:5,border:'none',background:'#1e1e1e',color:'#F0EBE3',fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>+</button>
                    <span style={{fontSize:13,fontWeight:800,color:cs.accent,minWidth:16,textAlign:'center'}}>{line.qty}</span>
                    <button onClick={e=>{e.stopPropagation();adjustQty(line.lineId,-1);}} style={{width:24,height:24,borderRadius:5,border:'none',background:'#1e1e1e',color:'#F0EBE3',fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>−</button>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#F0EBE3',lineHeight:1.2}}>{line.name}</div>
                    {line.note && <div style={{fontSize:10,color:cs.accent,marginTop:2,fontStyle:'italic'}}>↳ {line.note}</div>}
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                    <span style={{fontSize:13,fontWeight:700,color:'#F0EBE3'}}>£{(line.price*line.qty).toFixed(2)}</span>
                    <button onClick={e=>{e.stopPropagation();removeItem(line.lineId);}} style={{fontSize:10,color:'#C0392B',background:'none',border:'1px solid rgba(192,57,43,.25)',borderRadius:4,padding:'2px 7px',cursor:'pointer',fontWeight:600}}>void</button>
                  </div>
                </div>

                {/* Note picker (expanded when selected) */}
                {isSelected && (
                  <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid #1e1e1e'}} onClick={e=>e.stopPropagation()}>
                    <div style={{fontSize:10,color:'#4a4440',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em'}}>Add note</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                      {NOTE_OPTIONS.map(n=>(
                        <button key={n} onClick={()=>addNote(line.lineId, line.note===n?'':n)}
                          style={{padding:'4px 9px',borderRadius:5,fontSize:11,fontWeight:600,cursor:'pointer',border:`1px solid ${line.note===n?cs.accent:'#252525'}`,background:line.note===n?`${cs.accent}22`:'transparent',color:line.note===n?cs.accent:'#5a5450',transition:'all .1s'}}>
                          {n}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Totals + Pay */}
        <div style={{padding:'14px 18px 18px', borderTop:'1px solid #161616', flexShrink:0, background:'#0a0a0a'}}>
          {ticket.length > 0 && <>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5,fontSize:12,color:'#4a4440'}}><span>Subtotal</span><span>£{subtotal.toFixed(2)}</span></div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:14,fontSize:12,color:'#4a4440'}}><span>VAT (20%)</span><span>incl.</span></div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:16,fontSize:18,fontWeight:900}}>
              <span style={{color:'#F0EBE3'}}>Total</span>
              <span style={{color:gold}}>£{subtotal.toFixed(2)}</span>
            </div>
          </>}
          <button onClick={()=>ticket.length>0&&setShowPayment(true)} style={{
            width:'100%', padding:'15px', borderRadius:10, border:'none',
            background: ticket.length>0 ? 'linear-gradient(135deg,#D4A017,#C0392B)' : '#141414',
            color: ticket.length>0 ? '#fff' : '#2a2a2a',
            fontSize:15, fontWeight:800, cursor: ticket.length>0?'pointer':'not-allowed',
            letterSpacing:'0.02em', transition:'opacity .2s',
          }}>
            {ticket.length === 0 ? 'Add items to begin' : `Take Payment · £${subtotal.toFixed(2)}`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── APP SHELL ───────────────────────────────────────────
const SCREENS=[
  {id:'ordering',label:'Customer Ordering',tag:'1'},
  {id:'checkout',label:'Checkout',tag:'2'},
  {id:'confirmation',label:'Confirmation',tag:'3'},
  {id:'kitchen',label:'Kitchen Display',tag:'4'},
  {id:'admin',label:'Admin Dashboard',tag:'5'},
  {id:'superadmin',label:'Super Admin',tag:'6'},
  {id:'kiosk',label:'Cashier Kiosk',tag:'7'},
];

function NavBar({current,onChange}){
  return <div style={{position:'fixed',top:0,left:0,right:0,height:44,zIndex:1000,background:'#080808',borderBottom:'1px solid #161616',display:'flex',alignItems:'center',paddingLeft:12}}>
    <div style={{display:'flex',alignItems:'center',gap:6,marginRight:16,paddingRight:16,borderRight:'1px solid #161616',flexShrink:0}}>
      <div style={{width:20,height:20,borderRadius:5,background:'linear-gradient(135deg,#D4A017,#C0392B)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:'#fff'}}>T</div>
      <span style={{fontSize:12,fontWeight:700,color:'#F0EBE3',whiteSpace:'nowrap'}}>TakeawayOS</span>
    </div>
    <div style={{display:'flex',alignItems:'center',overflowX:'auto'}}>
      {SCREENS.map(s=><button key={s.id} onClick={()=>onChange(s.id)} style={{display:'flex',alignItems:'center',gap:5,padding:'0 11px',height:44,background:'transparent',border:'none',borderBottom:`2px solid ${current===s.id?gold:'transparent'}`,color:current===s.id?gold:'#3a3430',fontSize:12,fontWeight:current===s.id?600:400,cursor:'pointer',whiteSpace:'nowrap',transition:'color .15s'}}>
        <span style={{width:14,height:14,borderRadius:3,background:current===s.id?'rgba(212,160,23,.2)':'#161616',fontSize:8,fontWeight:700,color:current===s.id?gold:'#222',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{s.tag}</span>
        {s.label}
      </button>)}
    </div>
  </div>;
}

function App(){
  const [screen,setScreen]=React.useState(()=>localStorage.getItem('tos_screen')||'ordering');
  const [basket,setBasket]=React.useState([]);
  const [order,setOrder]=React.useState(null);
  const go=s=>{setScreen(s);localStorage.setItem('tos_screen',s);};
  const addToBasket=item=>setBasket(b=>[...b,item]);
  const removeFromBasket=id=>setBasket(b=>{const idx=[...b].reverse().findIndex(i=>i.id===id);if(idx===-1)return b;const copy=[...b];copy.splice(b.length-1-idx,1);return copy;});
  const placeOrder=details=>{setOrder({...details,items:basket});go('confirmation');};
  return <div style={{minHeight:'100vh',background:'#0C0C0C',paddingTop:44}}>
    <NavBar current={screen} onChange={go}/>
    {screen==='ordering'&&<CustomerOrdering basket={basket} addToBasket={addToBasket} removeFromBasket={removeFromBasket} onCheckout={()=>go('checkout')}/>}
    {screen==='checkout'&&<Checkout basket={basket} onPlaceOrder={placeOrder} onBack={()=>go('ordering')}/>}
    {screen==='confirmation'&&<OrderConfirmation order={order} onNewOrder={()=>{setBasket([]);setOrder(null);go('ordering');}}/>}
    {screen==='kitchen'&&<KitchenScreen/>}
    {screen==='admin'&&<AdminDashboard/>}
    {screen==='superadmin'&&<SuperAdmin/>}
    {screen==='kiosk'&&<CashierKiosk/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
